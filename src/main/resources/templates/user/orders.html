<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Gym Management System</title>
    <th:block th:replace="fragments/dashboard :: css"></th:block>
    <style>
        .orders-header {
            background: linear-gradient(135deg, #2196f3 0%, #21cbf3 100%);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            color: white;
        }
        .orders-header h1 { margin: 0; }

        .order-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .order-card:hover {
            border-color: rgba(244, 81, 30, 0.3);
        }

        .order-id { color: var(--text-muted); font-size: 13px; }
        .order-item { font-size: 18px; font-weight: 600; margin: 5px 0; }
        .order-price { color: #f4511e; font-size: 20px; font-weight: 700; }

        .status-badge {
            display: inline-block;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-badge.pending { background: rgba(255, 193, 7, 0.2); color: #ffc107; }
        .status-badge.processing { background: rgba(33, 150, 243, 0.2); color: #2196f3; }
        .status-badge.ready { background: rgba(156, 39, 176, 0.2); color: #9c27b0; }
        .status-badge.delivered { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
        .status-badge.cancelled { background: rgba(244, 67, 54, 0.2); color: #f44336; }

        .order-timeline {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .timeline-step {
            text-align: center;
            flex: 1;
            position: relative;
        }
        .timeline-step::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 50%;
            right: -50%;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
        }
        .timeline-step:last-child::before { display: none; }
        .timeline-step .step-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 5px;
            position: relative;
            z-index: 1;
        }
        .timeline-step.completed .step-icon { background: #4caf50; }
        .timeline-step.active .step-icon { background: #f4511e; animation: pulse 1.5s infinite; }
        .timeline-step .step-label { font-size: 11px; color: var(--text-muted); }
        .timeline-step.completed .step-label { color: #4caf50; }
        .timeline-step.active .step-label { color: #f4511e; }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(244, 81, 30, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(244, 81, 30, 0); }
        }

        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .filter-tab {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .filter-tab:hover { background: rgba(244, 81, 30, 0.1); }
        .filter-tab.active { background: #f4511e; color: white; border-color: #f4511e; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-state i { font-size: 80px; color: var(--text-muted); opacity: 0.3; }
        .empty-state h3 { margin: 20px 0 10px; }
        .empty-state p { color: var(--text-muted); }
    </style>
</head>

<body>
    <div id="loading-overlay">
        <div style="text-align: center;">
            <div class="loading-spinner"></div>
            <div class="loading-text" style="color: white; margin-top: 15px;">Loading Orders...</div>
        </div>
    </div>

    <div class="dashboard-wrapper">
        <nav th:replace="fragments/dashboard :: sidebar-user(activePage='orders')"></nav>

        <div class="main-content">
            <div class="container-fluid">
                <div th:replace="fragments/dashboard :: header(title='My Orders')"></div>

                <!-- Header -->
                <div class="orders-header">
                    <h1>📦 My Orders</h1>
                    <p>Track your purchases and order history</p>
                </div>

                <!-- Filter Tabs -->
                <div class="filter-tabs">
                    <div class="filter-tab active" data-filter="all">All Orders</div>
                    <div class="filter-tab" data-filter="PENDING">⏳ Pending</div>
                    <div class="filter-tab" data-filter="PROCESSING">🔄 Processing</div>
                    <div class="filter-tab" data-filter="READY">✅ Ready for Pickup</div>
                    <div class="filter-tab" data-filter="DELIVERED">🎉 Delivered</div>
                </div>

                <!-- Orders List -->
                <div id="orders-container">
                    <div class="text-center">
                        <p class="text-muted">Loading orders...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block th:replace="fragments/dashboard :: scripts"></th:block>
    <script>
        let allOrders = [];
        let currentFilter = 'all';

        document.addEventListener('DOMContentLoaded', function() {
            loadOrders();
            setupEventListeners();
            document.getElementById('loading-overlay').style.display = 'none';
        });

        async function loadOrders() {
            try {
                const response = await fetch('/api/user/shop/purchases');
                const result = await response.json();
                if (result.status === 200) {
                    allOrders = result.data || [];
                    renderOrders();
                }
            } catch (error) {
                console.error('Error loading orders:', error);
                showError('Error loading orders');
            }
        }

        function renderOrders() {
            const container = document.getElementById('orders-container');
            let filtered = allOrders;

            if (currentFilter !== 'all') {
                filtered = allOrders.filter(o => o.fulfillmentStatus === currentFilter);
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fa fa-shopping-bag"></i>
                        <h3>No orders found</h3>
                        <p>${currentFilter === 'all' ? 'You haven\'t made any purchases yet.' : 'No orders with this status.'}</p>
                        <a href="/user/shop" class="btn btn-primary-custom mt-3">Browse Shop</a>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(order => `
                <div class="order-card">
                    <div class="row align-items-center">
                        <div class="col-md-6">
                            <span class="order-id">Order #${order.id}</span>
                            <h4 class="order-item">${order.itemName}</h4>
                            <p class="text-muted mb-0">
                                Qty: ${order.quantity} × $${order.unitPrice.toFixed(2)}
                            </p>
                        </div>
                        <div class="col-md-3 text-center">
                            <span class="order-price">$${order.totalPrice.toFixed(2)}</span>
                            <br>
                            <small class="text-muted">${order.paymentMethod}</small>
                        </div>
                        <div class="col-md-3 text-right">
                            <span class="status-badge ${order.fulfillmentStatus.toLowerCase()}">${order.fulfillmentStatus}</span>
                            <br>
                            <small class="text-muted">${formatDate(order.purchaseDate)}</small>
                            ${canCancel(order) ? `
                                <br>
                                <button class="btn btn-sm btn-outline-danger mt-2" onclick="cancelOrder(${order.id})">
                                    Cancel Order
                                </button>
                            ` : ''}
                        </div>
                    </div>

                    ${renderTimeline(order)}
                </div>
            `).join('');
        }

        function renderTimeline(order) {
            const steps = ['PENDING', 'PROCESSING', 'READY', 'DELIVERED'];
            const currentIndex = steps.indexOf(order.fulfillmentStatus);

            if (order.fulfillmentStatus === 'CANCELLED') {
                return `
                    <div class="order-timeline">
                        <div class="timeline-step" style="flex: none;">
                            <div class="step-icon" style="background: #f44336;">❌</div>
                            <div class="step-label" style="color: #f44336;">Order Cancelled</div>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="order-timeline">
                    ${steps.map((step, index) => `
                        <div class="timeline-step ${index < currentIndex ? 'completed' : ''} ${index === currentIndex ? 'active' : ''}">
                            <div class="step-icon">${getStepIcon(step, index <= currentIndex)}</div>
                            <div class="step-label">${formatStepLabel(step)}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function getStepIcon(step, isActive) {
            if (!isActive) return '';
            const icons = {
                'PENDING': '⏳',
                'PROCESSING': '🔄',
                'READY': '✅',
                'DELIVERED': '🎉'
            };
            return icons[step] || '•';
        }

        function formatStepLabel(step) {
            const labels = {
                'PENDING': 'Pending',
                'PROCESSING': 'Processing',
                'READY': 'Ready',
                'DELIVERED': 'Delivered'
            };
            return labels[step] || step;
        }

        function canCancel(order) {
            return order.fulfillmentStatus === 'PENDING';
        }

        async function cancelOrder(orderId) {
            if (!confirm('Are you sure you want to cancel this order?')) return;

            try {
                const response = await fetch(`/api/user/shop/purchases/${orderId}/cancel`, {
                    method: 'POST'
                });
                const result = await response.json();

                if (result.status === 200) {
                    showToast('Order cancelled successfully', 'success');
                    loadOrders();
                } else {
                    showToast(result.message || 'Failed to cancel order', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Error cancelling order', 'error');
            }
        }

        function setupEventListeners() {
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.dataset.filter;
                    renderOrders();
                });
            });
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', {
                month: 'short', day: 'numeric', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed; top: 20px; right: 20px; padding: 15px 25px;
                border-radius: 10px; z-index: 9999;
                background: ${type === 'success' ? '#4caf50' : '#f44336'}; color: white;
                box-shadow: 0 5px 20px rgba(0,0,0,0.3); font-weight: 500;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function showError(message) {
            document.getElementById('orders-container').innerHTML =
                `<div class="empty-state"><p class="text-danger">${message}</p></div>`;
        }
    </script>
</body>
</html>
