<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management - Gym Management System</title>
    <th:block th:replace="fragments/dashboard :: css"></th:block>
    <link rel="stylesheet" th:href="@{/css/api-service.css}">
    <style>
        .stats-card {
            background: linear-gradient(135deg, var(--card-bg) 0%, #1a1a2e 100%);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .stats-card .icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .stats-card .icon.primary { background: rgba(244, 81, 30, 0.2); color: #f4511e; }
        .stats-card .icon.success { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
        .stats-card .icon.warning { background: rgba(255, 193, 7, 0.2); color: #ffc107; }
        .stats-card .icon.danger { background: rgba(244, 67, 54, 0.2); color: #f44336; }
        .stats-card .icon.info { background: rgba(33, 150, 243, 0.2); color: #2196f3; }
        .stats-card h3 { font-size: 28px; margin: 10px 0 5px; }
        .stats-card p { color: var(--text-muted); margin: 0; }

        .item-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }
        .item-card:hover { transform: translateY(-5px); }
        .item-card .item-image {
            height: 150px;
            background: linear-gradient(135deg, #2a2a3e, #1a1a2e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            overflow: hidden;
        }
        .item-card .item-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 8px;
        }
        .image-preview-box {
            width: 100%;
            height: 120px;
            background: linear-gradient(135deg, #2a2a3e, #1a1a2e);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            overflow: hidden;
            margin-top: 8px;
        }
        .image-preview-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 8px;
        }
        .item-card .item-body { padding: 15px; }
        .item-card .item-name { font-weight: 600; margin-bottom: 5px; }
        .item-card .item-price { color: #f4511e; font-size: 18px; font-weight: 700; }
        .item-card .item-stock { font-size: 14px; }
        .item-card .item-stock.low { color: #ffc107; }
        .item-card .item-stock.out { color: #f44336; }
        .item-card .item-stock.ok { color: #4caf50; }

        .category-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .category-badge.supplement { background: rgba(156, 39, 176, 0.2); color: #9c27b0; }
        .category-badge.merchandise { background: rgba(33, 150, 243, 0.2); color: #2196f3; }
        .category-badge.equipment { background: rgba(255, 152, 0, 0.2); color: #ff9800; }
        .category-badge.supplies { background: rgba(0, 150, 136, 0.2); color: #009688; }

        .alert-item {
            background: rgba(255, 193, 7, 0.1);
            border-left: 4px solid #ffc107;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 0 8px 8px 0;
        }
        .alert-item.high {
            background: rgba(244, 67, 54, 0.1);
            border-left-color: #f44336;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px 20px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }
        .tab-btn.active {
            color: #f4511e;
            border-bottom-color: #f4511e;
        }
    </style>
</head>

<body>
<div id="loading-overlay" style="display: none;">
    <div style="text-align: center;">
        <div class="loading-spinner"></div>
        <div class="loading-text" style="color: white; margin-top: 15px;">Loading...</div>
    </div>
</div>

<div class="dashboard-wrapper">
    <nav th:replace="fragments/dashboard :: sidebar(activePage='inventory')"></nav>

    <div class="main-content">
        <div class="container-fluid">
            <div th:replace="fragments/dashboard :: header(title='Inventory Management')"></div>

            <div class="row mb-4">
                <div class="col-md-3">
                    <div class="stats-card">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <p>Total Items</p>
                                <h3 id="stat-total-items">0</h3>
                            </div>
                            <div class="icon primary"><i class="fa fa-box"></i></div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stats-card">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <p>Stock Value</p>
                                <h3 id="stat-stock-value" style="color: white;">$0</h3>
                            </div>
                            <div class="icon success"><i class="fa fa-dollar-sign"></i></div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stats-card">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <p>Low Stock</p>
                                <h3 id="stat-low-stock" style="color: red">0</h3>
                            </div>
                            <div class="icon warning"><i class="fa fa-exclamation-triangle"></i></div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stats-card">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <p>Shop Revenue</p>
                                <h3 id="stat-revenue">$0</h3>
                            </div>
                            <div class="icon info"><i class="fa fa-chart-line"></i></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-card">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="tab-container">
                        <button class="tab-btn active" data-tab="all">All Items</button>
                        <button class="tab-btn" data-tab="supplement">Supplements</button>
                        <button class="tab-btn" data-tab="merchandise">Merchandise</button>
                        <button class="tab-btn" data-tab="equipment">Equipment</button>
                        <button class="tab-btn" data-tab="supplies">Supplies</button>
                        <button class="tab-btn" data-tab="alerts">⚠️ Alerts</button>
                    </div>
                    <button id="add-item-btn" class="btn btn-primary-custom">
                        <i class="fa fa-plus"></i> Add Item
                    </button>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="input-group">
                            <input type="text" id="search-input" class="form-control" placeholder="Search items...">
                            <div class="input-group-append">
                                    <span class="input-group-text" style="background-color: var(--card-bg); border-color: #333;">
                                        <i class="fa fa-search"></i>
                                    </span>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="items-container" class="row">
                    <div class="col-12 text-center">
                        <p class="text-muted">Loading items...</p>
                    </div>
                </div>

                <div id="alerts-container" style="display: none;">
                    <h4 class="mb-3">📦 Stock Alerts</h4>
                    <div id="alerts-list">
                        <p class="text-muted">Loading alerts...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="itemModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="itemModalLabel">Add New Item</h5>
                <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
            </div>
            <form id="item-form">
                <div class="modal-body">
                    <input type="hidden" id="item-id">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Item Name *</label>
                                <input type="text" id="item-name" class="form-control" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Category *</label>
                                <select id="item-category" class="form-control" required>
                                    <option value="">Select Category</option>
                                    <option value="SUPPLEMENT">Supplement</option>
                                    <option value="MERCHANDISE">Merchandise</option>
                                    <option value="EQUIPMENT">Equipment</option>
                                    <option value="SUPPLIES">Supplies</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="item-description" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-4">
                            <div class="form-group">
                                <label>Price *</label>
                                <input type="number" id="item-price" class="form-control" step="0.01" min="0" required>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label>Cost Price</label>
                                <input type="number" id="item-cost-price" class="form-control" step="0.01" min="0">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label>Stock Quantity *</label>
                                <input type="number" id="item-stock" class="form-control" min="0" required>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4">
                            <div class="form-group">
                                <label>Low Stock Threshold</label>
                                <input type="number" id="item-threshold" class="form-control" min="1" value="10">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label>Brand</label>
                                <input type="text" id="item-brand" class="form-control">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label>SKU</label>
                                <input type="text" id="item-sku" class="form-control">
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Status</label>
                                <select id="item-status" class="form-control">
                                    <option value="ACTIVE">Active</option>
                                    <option value="INACTIVE">Inactive</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Featured Item</label>
                                <select id="item-featured" class="form-control">
                                    <option value="false">No</option>
                                    <option value="true">Yes</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-8">
                            <div class="form-group">
                                <label>Product Image</label>
                                <select id="item-image-select" class="form-control" onchange="onImageSelectChange()">
                                    <option value="">None (use category icon)</option>
                                    <option value="/img/admin/Whey_Protein_Powder.png">Whey Protein Powder</option>
                                    <option value="/img/admin/Pre-Workout_Energy.png">Pre-Workout Energy</option>
                                    <option value="/img/admin/BCAA Amino Acids.png">BCAA Amino Acids</option>
                                    <option value="/img/admin/Creatine Monohydrate.png">Creatine Monohydrate</option>
                                    <option value="/img/admin/Multivitamin Pack.png">Multivitamin Pack</option>
                                    <option value="/img/admin/Fish Oil Omega-3.png">Fish Oil Omega-3</option>
                                    <option value="/img/admin/Sports Water Bottle.png">Sports Water Bottle</option>
                                    <option value="/img/admin/Gym Bag.png">Gym Bag</option>
                                    <option value="/img/admin/Workout Gloves.png">Workout Gloves</option>
                                    <option value="/img/admin/Resistance Bands Set.png">Resistance Bands Set</option>
                                    <option value="/img/admin/Jump Rope.png">Jump Rope</option>
                                    <option value="/img/admin/Yoga Mat.png">Yoga Mat</option>
                                    <option value="/img/admin/Foam Roller.png">Foam Roller</option>
                                    <option value="/img/admin/Lifting Straps.png">Lifting Straps</option>
                                    <option value="/img/admin/Protein Bar (Box of 12).png">Protein Bar (Box of 12)</option>
                                    <option value="/img/admin/Energy Drink (6-Pack).png">Energy Drink (6-Pack)</option>
                                    <option value="/img/admin/Gym Towel.png">Gym Towel</option>
                                    <option value="/img/admin/hand zanitiser.png">Hand Sanitizer</option>
                                    <option value="_custom_">Custom URL...</option>
                                </select>
                                <input type="text" id="item-image-url" class="form-control mt-2" placeholder="Enter image URL" style="display: none;" oninput="updateImagePreview()">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label>Preview</label>
                            <div class="image-preview-box" id="image-preview">
                                📦
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary-custom">Save Item</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="stockModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Adjust Stock</h5>
                <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
            </div>
            <form id="stock-form">
                <div class="modal-body">
                    <input type="hidden" id="stock-item-id">
                    <p>Item: <strong id="stock-item-name"></strong></p>
                    <p>Current Stock: <span id="stock-current"></span></p>
                    <div class="form-group">
                        <label>Adjustment Type *</label>
                        <select id="stock-type" class="form-control" required>
                            <option value="RESTOCK">Restock (Add)</option>
                            <option value="ADJUSTMENT">Adjustment</option>
                            <option value="DAMAGE">Damage (Deduct)</option>
                            <option value="EXPIRED">Expired (Deduct)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Quantity Change *</label>
                        <input type="number" id="stock-quantity" class="form-control" required>
                        <small class="text-muted">Use positive for additions, negative for deductions</small>
                    </div>
                    <div class="form-group">
                        <label>Reason</label>
                        <textarea id="stock-reason" class="form-control" rows="2"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary-custom">Update Stock</button>
                </div>
            </form>
        </div>
    </div>
</div>

<th:block th:replace="fragments/dashboard :: scripts"></th:block>
<script th:src="@{/js/admin/inventory.js}"></script>
</body>
</html>
